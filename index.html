<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e8ddd0">
  <meta name="description" content="Apple Notes and Notion inspired memo workspace">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <title>MemoGPT Workspace</title>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-panel">
        <p class="brand-kicker">Personal Knowledge Space</p>
        <h1>MemoGPT</h1>
        <p class="brand-copy">Apple Notes の軽さと Notion の整理感を合わせた、毎日使えるメモワークスペース。</p>
      </div>

      <section class="sidebar-section">
        <p class="section-label">Smart Views</p>
        <div class="smart-list" id="smartViews"></div>
      </section>

      <section class="sidebar-section">
        <div class="section-row">
          <p class="section-label">Folders</p>
          <button class="ghost-button" id="newFolderButton" type="button">New</button>
        </div>
        <div class="folder-list" id="folderList"></div>
      </section>

      <section class="sidebar-section">
        <p class="section-label">Workspace</p>
        <div class="workspace-stats" id="workspaceStats"></div>
      </section>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="topbar-left">
          <button id="menuToggle" class="icon-button" type="button" aria-label="Toggle sidebar">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div>
            <p class="eyebrow">Memo workspace</p>
            <h2 id="workspaceTitle">All Notes</h2>
          </div>
        </div>

        <div class="topbar-actions">
          <label class="search-box">
            <input id="searchInput" type="search" placeholder="Search notes, tags, and ideas">
          </label>
          <label class="file-button secondary-button">
            <span>Import</span>
            <input id="importInput" type="file" accept="application/json">
          </label>
          <button id="exportButton" class="secondary-button" type="button">Export</button>
        </div>
      </header>

      <section class="workspace-grid">
        <div class="note-rail glass-panel">
          <div class="rail-header">
            <div>
              <p class="eyebrow">Notes</p>
              <h3 id="noteCount">0 notes</h3>
            </div>
            <button id="newNoteButton" class="primary-button" type="button">New Note</button>
          </div>

          <div class="quick-actions" id="quickActions">
            <button class="chip-button" type="button" data-template="meeting">Meeting</button>
            <button class="chip-button" type="button" data-template="journal">Journal</button>
            <button class="chip-button" type="button" data-template="task">Task List</button>
          </div>

          <div class="note-list" id="noteList"></div>
        </div>

        <section class="editor-panel glass-panel">
          <div class="editor-head">
            <div>
              <p class="eyebrow" id="editorEyebrow">Ready</p>
              <h3 id="editorTitleLabel">Create or select a note</h3>
            </div>
            <div class="editor-actions">
              <button id="duplicateNoteButton" class="secondary-button" type="button">Duplicate</button>
              <button id="deleteNoteButton" class="danger-button" type="button">Delete</button>
            </div>
          </div>

          <form id="noteForm" class="note-form">
            <input id="titleInput" type="text" placeholder="Note title">

            <div class="meta-grid">
              <label class="field-card">
                <span>Folder</span>
                <select id="folderSelect"></select>
              </label>

              <label class="field-card">
                <span>Tags</span>
                <input id="tagsInput" type="text" placeholder="design, research, ideas">
              </label>
            </div>

            <div class="toggle-row">
              <label class="toggle-pill">
                <input id="pinnedInput" type="checkbox">
                <span>Pinned</span>
              </label>
              <label class="toggle-pill">
                <input id="favoriteInput" type="checkbox">
                <span>Favorite</span>
              </label>
            </div>

            <div class="block-toolbar">
              <button class="chip-button" type="button" data-insert="heading">Heading</button>
              <button class="chip-button" type="button" data-insert="todo">Checklist</button>
              <button class="chip-button" type="button" data-insert="callout">Callout</button>
            </div>

            <textarea id="bodyInput" rows="14" placeholder="Start writing. Use markdown, checklists, links, and loose ideas."></textarea>

            <div class="composer-foot">
              <label class="upload-box">
                <span>Add images</span>
                <input id="imageInput" type="file" accept="image/*" multiple>
              </label>
              <p class="save-status" id="saveStatus">Everything saved</p>
            </div>

            <div class="image-strip" id="editingImages"></div>
          </form>

          <section class="preview-panel">
            <div class="section-row">
              <div>
                <p class="eyebrow">Preview</p>
                <h3>Readable note view</h3>
              </div>
            </div>
            <article class="preview-card" id="previewCard"></article>
          </section>
        </section>
      </section>
    </main>
  </div>

  <template id="smartViewTemplate">
    <button class="nav-item" type="button">
      <span class="nav-item-label"></span>
      <span class="nav-item-count"></span>
    </button>
  </template>

  <template id="folderTemplate">
    <button class="nav-item" type="button">
      <span class="nav-item-label"></span>
      <span class="nav-item-count"></span>
    </button>
  </template>

  <template id="noteItemTemplate">
    <article class="note-item">
      <div class="note-item-top">
        <h4 class="note-item-title"></h4>
        <div class="note-item-badges"></div>
      </div>
      <p class="note-item-body"></p>
      <div class="note-item-meta">
        <span class="note-item-folder"></span>
        <span class="note-item-date"></span>
      </div>
    </article>
  </template>

  <template id="editingImageTemplate">
    <div class="editing-image-card">
      <img class="editing-image-preview" alt="Attached image preview">
      <button class="ghost-button remove-image-button" type="button">Remove</button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
